# target : dÃĐfinition

Une `target` est une ÃĐtape de la sÃĐquence d'instructions.  

Une `target` est au minimum une _cible_ (nom d'un objet) et une _dÃĐpendance_ (commande R) 

Une `target` produit un objet R qui est enregistrÃĐ dans la mÃĐmoire de la session

Une _dÃĐpendance_ est une expression qui dÃĐpent d'une `target` prÃĐcÃĐdente

Le package `targets` exÃĐcute seulement les targets qui ne sont pas Ã  jour.

# Qu'est-ce qui fait une bonne target ?

Comme une fonction, une `target` peut faire trois choses :

Si une target est trop longue, vous avez avantage Ã  la briser en petits morceaux pour que chaque ÃĐtape soit vÃĐrifiÃĐe. 

Alternativement, pour une sÃĐquence d'analyse trÃĻs compliquÃĐe, on pourrait vouloir regrouper les ÃĐtapes pour ÃĐviter d'avoir une liste trop longue.

# Qu'est-ce qui fait une bonne `target` ? 

Le grain d'une sÃĐquence dÃĐpend donc d'un compromis : 

1. Les `targets` sont suffisamment importantes pour sauver du temps si elles sont ignorÃĐes (e.g. construire votre base de donnÃĐes et faire les injections) 
2. Suffisamment petites pour qu'il soit pertinent d'automatiser le processus
3. Retourne un seul objet qui

  - pertinent pour le projet 
  - peut ÃŠtre sauvÃĐ comme objet
