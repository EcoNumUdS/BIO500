# Qu'est ce que Git?

.pull-left[

C'est un système qui permet de suivre l'**ajout** et les **modifications** pour un ensemble de fichiers.

**C'est le cahier de lab du programmeur.**

- Logiciel libre soutenu par une large communauté (12 millions d'utilisateurs dans le monde)
- Par défault, Git est installé sur les systèmes d'exploitation Linux et Mac.
- Il peut être installé sur Windows: [https://git-scm.com/download/win](https://git-scm.com/download/win)
]

.pull-right[
  .center[
    &lt;img src="./assets/img/git.png" width="70%"&gt;&lt;/img&gt;
    &lt;img src="./assets/img/LinusTorvalds.jpg" width="50%"&gt;&lt;/img&gt;

    Linus Torvalds
  ]

# Qu'est ce que Git?

Il présente l'avantage d'être extrêmement versatile.

1. Racontez l'histoire de votre projet
2. Voyager dans le temps
3. Expérimentez avec les changements
4. Backup votre travail
5. **Collaborer sur des projets**

--

Mais le désavantage de fonctionner seulement avec les fichiers "plain text"...

**Question**: Qu'est ce qu'un fichier "plain text"?

# Revenir en arrière dans le temps

Les commandes de git sont très efficaces et puissantes, elles peuvent néanmoins être fastidieuses et difficiles pour les débutants. 

RStudio facilite ce travail avec un simple onglet "history" et avec un navigateur qui vous permet de passer d'une version à l'autre et de mettre en valeur les modifications qui ont été enregistrées sous forme de commit.

# Exercice 

Cet exercice se fait en équipe de 2.

1. Ajouter votre partenaire à votre répertoire GitHub en tant que collaborateur : 
   - Aller sur votre répertoire GitHub.
   - Cliquer sur "Settings" &gt; "Manage access" &gt; "Invite a collaborator".
   - Entrer le nom d'utilisateur de votre partenaire et l'inviter à collaborer.
2. Un membre ajoute à son répertoire GitHub un fichier `README.md` avec `# Titre` pour entête et enregistre les modifications (`commit` puis `push`).
3. Associer le dépôt GitHub à RStudio sur l'ordinateur du partenaire.
4. Chacun modifie l'entête du fichier `README.md` et enregistre les modifications.
5. Git `commit` puis `push`.

Qu'est-ce qui arrive ?

--

## Un merge conflict (conflit de fusion) !!

Vous avez chacun fait des modifications sur un même fichier. Git ne sait pas quelle version prioriser.

---

# Gestion des conflits

Le conflit de de fusion est le résultat de deux modifications concurrentes sur un même fichier. C'est le conflit le plus fréquent et survient lorsqu'on oublie de `git pull` avant de `git push`

Il est possible de résoudre le conflit directement dans RStudio. Essayez-vous !

Marche à suivre : [Chapitre 7.3 *Git, Conflits*](https://econumuds.github.io/BIO500/git.html#conflits)

---

# Gestion des conflits

[Chapitre 7.3 *Git, Conflits*](https://econumuds.github.io/BIO500/git.html#conflits)

1. `pull` pour récupérer les modifications
2. Inspecter le fichier en conflit
3. Résoudre le conflit
4. Enregistrer les modifications : `add` (*staged*), `commit` et `push`

![](./assets/img/rstudio-merge-conflict.png)

# Documentation

- Le code : par des commentaires pour faciliter la compréhension.
- Le projet : le fichier `README.md` permet de documenter le projet avec une description, une structure, des instructions et des informations complémentaires.
---

# Documentation

## Le code

```r
#############################################
# Ce script permet de nettoyer les données
#
# Auteur: Victor Cameron
# Date: 2021-10-01
#############################################

# 1. Charger les données
data &lt;- read.csv("data/raw/data.csv")

# 2. Nettoyer les données
clean_data &lt;- clean_data(data)
```

---

# Documentation

## README.md

Quelques éléments à inclure dans un fichier `README.md` :

- Titre du projet : nom du projet.
- Description du projet : objectifs, contexte, données, méthodes, résultats. Ça peut être un résumé du projet.
- Structure du répertoire : organisation des fichiers, scripts et ressources.
- Description des fichiers : rôles et contenus des principaux fichiers.
- Instructions
    - Comment exécuter le projet.
    - Comment reproduire les résultats.
    - Comment accéder aux données et aux ressources.
- Auteurs et contributeurs : qui a travaillé sur le projet.

## .gitignore

Il arrive que certains scripts génèrent des fichiers temporaires qui ne doivent pas être conservés inutilement et être poussés sur github. 

Le fichier `.gitignore` vous permet d'identifier les fichiers qui ne doivent pas être versés sur le serveur. 

Il existe des gabarits proposés pour [R](https://www.toptal.com/developers/gitignore/api/r).

```bash
# R
.RData
.Rhistory

# R projets
.Rproj.user/

# Résultats intermédiaires
donnees_intermediaires/*
```

# Le YAML (metadata)

- Les métadonnées et les options du document sont définies ici
- La syntaxe est `cle: valeur`
- Commence et se termine avec trois tirets `---`
- Toujours au début du document

```r
---
title: "Mon titre"
author: "Victor Cameron"
date: "29/03/2022"
output: html_document
    toc: true
---
```

Les options d'`output` définissent le type de document produit.

Voir `?html_document`, `?pdf_document`, `?word_document`

head(iris_setosa)
```
````

# Principes clefs de la reproductibilité

&lt;hr width="65%" size="0.3" color="orange" style="margin-top:-20px;"&gt;&lt;/hr&gt;

---

# Principes clefs de la reproductibilité

1. Séparation des responsabilités
2. Flux de données
3. Scalabilité avant performance
4. Traçabilité et maintenance
5. Principes FAIR

---

# 1. Séparation des responsabilités 

Le concept de *Separation of Concerns* a été introduit par Edsger W. Dijkstra (1974) dans son article *On the Role of Scientific Thought*. Il s'agit d'une approche pour gérer la complexité des systèmes informatiques : **chaque partie du programme devrait s’occuper d’un seul aspect du problème**. En séparant les responsabilités, il devient plus facile de : comprendre le code, maintenir le programme et faire évoluer le système.

&gt; Une fonction = une responsabilité

Une fonction devrait pouvoir être résumée en une seule phrase. Si la phrase contient “et”, la fonction fait probablement trop de choses.

❌ load_and_clean_data()

✔ load_data()

✔ clean_data()

---

# 2. Flux de données ETL

## *Extract – Transform – Load*

.center[
![:scale 70%](assets/img/etl_processus.png)
]

Un flux ETL décrit les étapes qui permettent de déplacer et préparer des données entre différentes sources et systèmes. Le concept a été popularisé dans les systèmes de gestion de données et constitue aujourd’hui une pratique centrale en ingénierie des données.

---

# 2. Flux de données ETL

## *Extract – Transform – Load*

**Extract**
Extraire les données depuis leur source
(ex. fichiers CSV, API, base de données, capteurs)

**Transform**
Nettoyer, filtrer, restructurer ou enrichir les données
(ex. corriger les valeurs manquantes, changer les formats, agréger)

**Load**
Charger les données dans le système cible
(ex. base de données, entrepôt de données, application)

---

# 3. Scalabilité avant performance

&gt; “Premature optimization is the root of all evil.”
&gt; — Donald Knuth

Ordre des priorités :
1. Le code **fonctionne**
2. Le code est **clair**
3. Le code est **rapide** (si nécessaire)

Un programme bien structuré est plus facile à faire évoluer et à adapter lorsque les données ou les besoins augmentent.

---

# 4. Traçabilité et maintenance

Objectif : **un programme reproductible et maintenable**

- **Paramètres explicites** : éviter les valeurs cachées dans le code. On peut expliciter les valeurs par défaut, les *paramètres*, en haut du script ou dans un fichier de configuration pour les rendre facilement modifiables
- **Logs** : garder une trace et suivre l'exécution du programme
- **Automatisation** : limiter les interventions manuelles : un fichier qui contient un ensemble de directives qui sont exécutées par l'ordinateur. Les instructions et leurs dépendances sont spécifiées
- **Tests** : vérifier que le code fonctionne toujours après des modifications

&gt; Ces principes sont explorés dans un l'atelier qui suivra.

---

# 5. Principes FAIR

S'applique aux données, algorithmes et pipelines. Représentent un standard que tous peuvent suivre pour favoriser la reproductibilité et la transparence de leurs travaux.

.center[
&lt;img src="assets/img/fair_principle.png" height="400px"&gt;&lt;/img&gt;
]

---

# 5. Principes FAIR

## Findable

- (Trouvable) : Les données et scripts doivent être bien documentées et indexées pour être facilement retrouvées.
- DOI, métadonnées, catalogues de données.

---

# 5. Principes FAIR

## Findable

## Accessible
- (Accessible) : Les données doivent être accessibles avec des protocoles ouverts et, si elles sont restreintes, clairement expliquées.
- Dépôts de données ouverts, licences claires, accès via des API.

---

# 5. Principes FAIR

## Findable

## Accessible

## Interoperable

- (Interopérable) : Les données doivent être lisibles et utilisables par différents outils et logiciels.
- Formats ouverts, vocabulaire standardisé.

---

# 5. Principes FAIR

## Findable

## Accessible

## Interoperable

## Reusable

- (Réutilisable) : Les données et scripts doivent être suffisamment bien décrits et structurés pour être réutilisés dans d’autres contextes.
- Documentation détaillée, traçabilité des versions, attribution claire des auteurs.

---

# 5. Principes FAIR

Alors que l'adoption des principes FAIR sont centraux à la résolution de la crise de reproductibilité et sont à connaitre de tous les chercheurs, ils sont *de facto* appliqués à votre projet et ne requierent pas de travail supplémentaire :

- Utilisation d'un README et de commentaires pour documenter votre projet
- Utilisation de GitHub pour partager votre code et vos données
- Utilisation d'une base de données relationnelle pour stocker vos données
- Utilisation de R et RMarkdown pour concevoir et partager votre code et votre rapport

&lt;!-- # Discussion

## Quels sont les liens concrets entre les principes FAIR et les étapes d'une étude scientifique ?

.center[
&lt;img src="assets/img/flow_bio500.png" width="90%"&gt;&lt;/img&gt;
] --&gt;

&lt;!-- 
### **1. Contexte et importance des principes FAIR (5 min)**  
- **Problème actuel en science** : Difficulté à reproduire des études, accès limité aux données, méthodes peu documentées.  
- **Pourquoi les principes FAIR ?** : Créés pour améliorer la gestion, le partage et la réutilisation des données scientifiques.  
- **Objectif** : Assurer que les données soient facilement retrouvables, accessibles, compatibles avec différents systèmes et réutilisables par d’autres chercheurs.  

### **2. Présentation des quatre principes FAIR (10 min)**  

1. **Findable (Trouvable)**  
   - Définition : Les données doivent être bien documentées et indexées pour être facilement retrouvées.  
   - Exemples : Utilisation d’identifiants uniques (DOI), métadonnées complètes, catalogues de données.  

2. **Accessible (Accessible)**  
   - Définition : Les données doivent être accessibles avec des protocoles ouverts et, si elles sont restreintes, clairement expliquées.  
   - Exemples : Dépôts de données ouverts, licences claires (ex. Creative Commons), accès via des API.  

3. **Interoperable (Interopérable)**  
   - Définition : Les données doivent être lisibles et utilisables par différents outils et logiciels.  
   - Exemples : Formats ouverts (CSV, JSON), vocabulaire standardisé (ex. Darwin Core pour la biodiversité).  

4. **Reusable (Réutilisable)**  
   - Définition : Les données doivent être suffisamment bien décrites et structurées pour être réutilisées dans d’autres contextes.  
   - Exemples : Documentation détaillée, traçabilité des versions, attribution claire des auteurs.  

### **3. Lien avec la reproductibilité (5 min)**  
- Une étude reproductible nécessite que ses données soient bien organisées et accessibles.  
- Les principes FAIR réduisent les obstacles à la reproduction des résultats en rendant les données plus compréhensibles et exploitables.  
- **Question de transition pour la discussion** : Quels sont les liens concrets entre ces principes et les étapes d’une étude scientifique ?

# Essai sur la reproductibilité

&lt;hr width="65%" size="0.3" color="orange" style="margin-top:-20px;"&gt;&lt;/hr&gt;

---

# Objectifs

L'objectif d'un essai est de présenter une perspective sur un enjeu scientifique, appuyé par une argumentation logique et une lecture critique de la littérature. L'objectif spécifique de ce travail est de formuler et défendre une opinion sur les enjeux de reproductibilité en écologie.

---

# Mise en situation

Le journal Québec Science vous a invité à titre de chercheur à écrire l'éditorial du mois sur cet enjeu. Plus spécifiquement, on vous demande de vous exprimer sur l'importance de la *transparence* et des standards de *reproductibilité* dans un contexte où il y a une accélération de la recherche par l'utilisation de l'intelligence artificielle. Cette invitation fait suite à la publication d'un article paru dans le dernier numéro du journal :

[ChatGPT en science : alerte à l’imposteur!](https://www.quebecscience.qc.ca/edito/chatgpt-science-alerte-imposteur/)

Vous êtes invités à faire une lecture critique de la situation actuelle, à identifier là où les agents conversationnels utilisant l'intelligence artificielle peuvent aider et à proposer des mesures qui permettront de répondre aux enjeux actuels.

---

# Attentes

Québec Science est un journal destiné à un grand public, alors je vous invite à personnaliser votre argumentation et à rendre original sa présentation. Vous pouvez utiliser des tableaux, des figures ou encore des encadrés pour étayer vos propos. Essayez de faire plus que de rapporter les arguments présentés en classe, n'hésitez pas à **personnaliser** votre essai.

---

# Consignes

- Le texte doit faire au maximum 1200 mots et doit être accompagné d'un résumé court, provocateur de 100 mots. Le document peut être supporté par une figure et/ou un tableau.
- L'argumentaire doit être supporté de littérature scientifique appropriée. Vous pouvez utiliser les références discutées en classe, celles disponible sur le dépôt git et vous devez également trouver de **nouvelles références** pour appuyer vos propos.
- Pour chaque argument (positif ou négatif) amené, vous devez en **donner un exemple personnel et concret** prenant place dans le cadre d'un travail scolaire.
- Le texte peut être structuré en sections afin de permettre au lecteur de suivre le développement de l'argumentaire.
- La section finale doit résumer les principaux points.

---

# Évaluation

- Respect des consignes
- Titre et résumé
- Formulation de la proposition 
- Qualité de l'argumentation
    + Identification de l'apport de l'intelligence artificielle
    + Identification des problèmes
    + Proposition de solutions
    + Qualité de la mise en contexte personnelle (exemples)
- Originalité
- Mise en page
- Bibliographie
- Qualité de la langue
